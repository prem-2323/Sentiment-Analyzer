<!DOCTYPE html>
<html>
<head>
    <title>Twitter Sentiment Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%2338bdf8'>📊</text></svg>" />
    <style>
        :root {
            --bg: #081120;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-border: rgba(148, 163, 184, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-strong: #0ea5e9;
            --positive: #22c55e;
            --negative: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.24), transparent 28%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 24%),
                linear-gradient(135deg, #050816 0%, #0f172a 48%, #111827 100%);
            text-align: center;
            padding: 40px 16px;
        }

        .shell {
            width: min(900px, 100%);
            margin: 0 auto;
            padding: 28px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 80px rgba(2, 6, 23, 0.45);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 5vw, 3.4rem);
            color: #f8fafc;
        }

        .subtitle {
            margin: 0 auto 28px;
            max-width: 680px;
            color: var(--muted);
            line-height: 1.6;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 10px;
            font-size: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.88);
            color: var(--text);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: rgba(56, 189, 248, 0.85);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        button {
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            box-shadow: 0 12px 30px rgba(14, 165, 233, 0.25);
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
        }

        .card {
            margin-top: 24px;
            padding: 18px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(148, 163, 184, 0.16);
            text-align: left;
        }

        #result {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .positive {
            color: var(--positive);
            font-weight: 700;
        }

        .negative {
            color: var(--negative);
            font-weight: 700;
        }

        .error {
            color: #fca5a5;
            font-weight: 600;
        }

        .hint {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <main class="shell">
        <h1>Twitter Sentiment Analyzer</h1>
        <p class="subtitle">Type a tweet or short sentence, send it to the Flask backend, and get the RNN model prediction instantly.</p>

        <textarea id="tweet" placeholder="Example: I absolutely loved this movie"></textarea>

        <div class="actions">
            <button id="analyzeBtn" onclick="analyze()">Analyze Sentiment</button>
        </div>

        <section class="card">
            <div id="result">Waiting for input...</div>
            <div class="hint">Backend route: <span>/predict</span></div>
        </section>
    </main>

    <script>
        async function analyze() {
            const button = document.getElementById("analyzeBtn");
            const text = document.getElementById("tweet").value;
            const result = document.getElementById("result");

            if (!text.trim()) {
                result.innerHTML = '<span class="error">Please enter some text first.</span>';
                return;
            }

            button.disabled = true;
            result.textContent = "Analyzing...";

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Prediction failed.");
                }

                const sentimentClass = data.sentiment === "Positive" ? "positive" : "negative";
                result.innerHTML =
                    'Sentiment: <span class="' + sentimentClass + '">' + data.sentiment + '</span><br>' +
                    'Confidence: ' + Number(data.score).toFixed(2);
            } catch (error) {
                result.innerHTML = '<span class="error">' + error.message + '</span>';
            } finally {
                button.disabled = false;
            }
        }
    </script>

</body>
</html>
